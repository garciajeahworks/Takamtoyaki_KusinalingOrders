<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KusinaLing Admin Panel</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f5f5f5;
        color: #333;
    }
    header {
        background-color: #ff6b6b;
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 1.5rem;
    }
    .orders {
        max-width: 900px;
        margin: 20px auto;
        padding: 10px;
    }
    .order-card {
        background-color: white;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .order-card h4 {
        margin: 0 0 5px;
    }
    .order-card p {
        margin: 5px 0;
        font-size: 0.9rem;
    }
    .order-card button {
        margin-right: 10px;
        padding: 6px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    .confirmed { background-color: #ffc107; color: white; }
    .delivered { background-color: #28a745; color: white; }
</style>
</head>
<body>

<header>🍛 KusinaLing Admin Panel</header>

<div class="orders" id="orders-container">
    <!-- Orders will be dynamically added here -->
</div>

<script src="admin.js"></script>
</body>
</html>
